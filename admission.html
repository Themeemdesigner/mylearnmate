<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnMate Admission Form</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f8ff;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#0ea5e9;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:15px;
background:#0ea5e9;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0284c7;
}
</style>
</head>
<body>

<div class="container">

<h1>LearnMate Admission Form</h1>

<form onsubmit="sendWhatsApp(); return false;">

<input type="text" id="student" placeholder="Student Name" required>

<input type="text" id="parent" placeholder="Parent Name" required>

<select id="class">
<option>Class 1</option>
<option>Class 2</option>
<option>Class 3</option>
<option>Class 4</option>
<option>Class 5</option>
<option>Class 6</option>
<option>Class 7</option>
<option>Class 8</option>
<option>Class 9</option>
<option>Class 10</option>
<option>Class 11</option>
<option>Class 12</option>
</select>

<select id="subject">
<option>Mathematics</option>
<option>Physics</option>
<option>Chemistry</option>
<option>Biology</option>
<option>English</option>
<option>Hindi</option>
<option>Malayalam</option>
<option>Arabic</option>
</select>

<input type="tel" id="phone" placeholder="Phone Number" required>

<button type="submit">
Book Free Demo Class
</button>

</form>

</div>

<script>

function sendWhatsApp(){

let student=document.getElementById('student').value;
let parent=document.getElementById('parent').value;
let clas=document.getElementById('class').value;
let subject=document.getElementById('subject').value;
let phone=document.getElementById('phone').value;

let message=`Hello LearnMate,

Student Name: ${student}
Parent Name: ${parent}
Class: ${clas}
Subject: ${subject}
Phone: ${phone}

I would like to book a free demo class.`;

window.open(
`https://wa.me/917907868464?text=${encodeURIComponent(message)}`,
'_blank'
);

}

</script>

</body>
</html>
